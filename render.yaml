# ATA Deployment - Render.com
# Uses MongoDB Atlas - create a free cluster and set MONGODB_URI.

services:
  - type: web
    name: ata-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: ata
      # Set CORS_ORIGINS to your frontend URL after deploy, e.g. https://ata-frontend.onrender.com
      - key: CORS_ORIGINS
        value: http://localhost:3000

  - type: web
    name: ata-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: ata-backend
          property: host
